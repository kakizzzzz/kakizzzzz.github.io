<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaki's Design Console</title>
    <meta
      name="description"
      content="Kaki Wangxiao's design portfolio featuring branding, pattern design, UI case studies, Amazon listing design, and selected visual projects."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kaki's Design Console" />
    <meta
      property="og:description"
      content="An immersive portfolio site showcasing branding, pattern design, UI work, Amazon listing design, and selected visual projects."
    />
    <meta property="og:image" content="%BASE_URL%assets/full-branding/mao-dot-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kaki's Design Console" />
    <meta
      name="twitter:description"
      content="An immersive portfolio site showcasing branding, pattern design, UI work, Amazon listing design, and selected visual projects."
    />
    <meta name="twitter:image" content="%BASE_URL%assets/full-branding/mao-dot-cover.png" />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
    <script>
      (function () {
        const url = new URL(window.location.href);
        const redirect = url.searchParams.get('redirect');

        if (!redirect) {
          return;
        }

        window.history.replaceState({}, '', redirect);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
